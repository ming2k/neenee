[package]
name = "neenee-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
glob = "0.3"
walkdir = "2"
dirs = "5"
uuid = { version = "1", features = ["v4"] }
httpdate = "1"
