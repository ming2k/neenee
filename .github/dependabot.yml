version: 2
updates:
  # Rust dependencies tracked in Cargo.lock
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group patch/minor bumps so they don't spam PRs; major bumps stay solo
    # for careful review (may affect MSRV).
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"

  # Keep GitHub Actions versions current (checkout, rust-cache, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
