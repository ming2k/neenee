name: Release

# Build and publish release binaries when a version tag is pushed.
# Triggered by `git tag v0.x.y && git push --tags`. CI still gates every
# push to main separately in ci.yml; this workflow only runs on tags.

on:
  push:
    tags:
      - "v*"

# A tag is an immutable release point; two concurrent builds for the same tag
# would race to own the GitHub release. Cancel any superseded run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      # Linux ARM64 needs a cross toolchain for linking; x86_64 builds natively.
      # `musl` builds link statically so the binary is portable across distros.
      - name: Install cross-link toolchain (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Install musl toolchain (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin neenee-code
      - name: Package
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          dirname="neenee-${version}-${{ matrix.target }}"
          mkdir "$dirname"
          cp target/${{ matrix.target }}/release/neenee-code "$dirname/"
          cp README.md LICENSE "$dirname/"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "$dirname.tar.gz" "$dirname"
            echo "asset=$dirname.tar.gz" >> $GITHUB_OUTPUT
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: neenee-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*.tar.gz
