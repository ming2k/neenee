name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so we don't burn minutes on
# repeated pushes to a PR branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Keep the dependency resolution locked to the committed Cargo.lock for
  # reproducible, cache-friendly CI.
  RUSTFLAGS: "-D warnings"

# Least privilege: everything below is read-only by default. Jobs that need
# more (the audit job posts a check run) widen their own scope.
permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # -D warnings comes from the workflow-level RUSTFLAGS.
      - run: cargo clippy --all-targets --locked

  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --locked --no-fail-fast

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Pin to the exact MSRV declared in every crate's Cargo.toml. Bump this
      # in lockstep when raising rust-version.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.95
      # `--locked` guarantees the Cargo.lock resolves under this toolchain.
      - run: cargo check --all-targets --locked

  doc:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Treat rustdoc warnings (broken intra-doc links, etc.) as failures so the
    # job can't quietly regress. The one prior broken link (`EXPLORE`) was fixed
    # in `crates/neenee-agent/src/task_tool.rs`.
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build docs for the whole workspace; catches hard rustdoc failures.
      - run: cargo doc --all --no-deps --document-private-items --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Coverage is informational; never gate merges on it. Build without
    # `-D warnings` so a stray warning in the coverage build (which uses
    # different rustc flags) can't turn the report red.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Generate an lcov report and print a textual summary to the log.
      - run: cargo llvm-cov --all --locked --lcov --output-path lcov.info
      - run: cargo llvm-cov --all --locked --summary-only
      # Persist the report as a workflow artifact so it can be downloaded and
      # viewed locally without wiring up a third-party coverage service.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # audit-check posts a check run, so it needs checks:write in addition to
    # the workflow's read-only default.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
